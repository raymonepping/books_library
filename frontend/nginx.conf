server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: unknown paths fall back to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy all /api/* calls to the backend service
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Health endpoint — forward to backend; useful for compose health probes
    location = /health {
        proxy_pass http://backend:3000/health;
    }

    # Cache static assets aggressively (Vite hashes them)
    location ~* \.(js|css|woff2?|ttf|svg|png|jpg|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}
